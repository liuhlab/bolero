site_name: bolero
site_url: https://liuhlab.github.io/bolero/
repo_url: https://github.com/liuhlab/bolero

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
  - mkdocs-jupyter:
      execute: false # render the committed notebook outputs; never re-run
      include_source: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Embedding & Meta Cell:
      - Cell embedding: tutorials/01_cell_embedding.ipynb
      - Meta cells: tutorials/02_meta_cell.ipynb
