# sky launch -c bolero -r -y setup-bolero.yaml; sky autostop -y bolero -i TIME_IN_MINUTES
# change image_id
# if using filestore, change the IP address

resources:
  cloud: gcp
  cpus: 64+
  memory: 256+
  region: us-central1
  disk_size: 512
  image_id: projects/hms-dev-greenberg-4923/global/images/bolero-240430

file_mounts:
  ~/.netrc: ~/.netrc  # for wandb
  /data:
    source: gs://hms-hanqing-analysis
    mode: MOUNT
  /ref:
    source: gs://hms-hanqing-reference
    mode: MOUNT
  /wmb:
    source: gs://hms-hanqing-wmb
    mode: MOUNT
  /tempdata:
    source: gs://hms-hanqing-temp
    mode: MOUNT

setup: |
  set -e  # Exit if any command failed.
  conda activate ray
  # sudo mount 192.168.179.186:/filestore /mnt/filestore

  if [ -f $HOME/.SKIPSETUP ]
  then
    echo "Skip setup"
  else
    # install inhouse packages
    mamba install -c conda-forge -n ray -y samtools pysam
    pip install wandb --upgrade
    pip install git+https://github.com/lhqing/scmallet.git

    gsutil -m cp -r gs://hms-hanqing-reference/pkg/bolero-process ~/ 
    pip install -e ~/bolero-process
    gsutil -m cp -r gs://hms-hanqing-reference/pkg/bolero ~/
    pip install -e ~/bolero
    gsutil -m cp -r gs://hms-hanqing-reference/pkg/scPrinter ~/
    pip install -e ~/scPrinter
    touch $HOME/.SKIPSETUP
  fi

run: |
  set -e  # Exit if any command failed.
  conda activate ray
  nohup jupyter-lab --LabApp.token='' --no-browser --port 9995 > ~/jupyter.log 2>&1 &
